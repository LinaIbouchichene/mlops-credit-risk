name: MLOps Hybrid Pipeline (Docker Hub + AWS ECS)

on:
  push:
    branches: [ "aws" ] # Se déclenche sur ta branche de travail actuelle

env:
  # Secrets Docker Hub
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  REPO_NAME: ${{ secrets.REPO_NAME }}
  # Config AWS
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: credit-risk-app
  ECS_SERVICE: credit-risk-service
  ECS_CLUSTER: cluster-credit-risk
  ECS_TASK_DEFINITION: credit-risk-task
  CONTAINER_NAME: streamlit-app

jobs:
  ci_pipeline: 
    name: Continuous Integration (Linting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install black pylint pytest

      - name: Code Check (Black & Pylint)
        run: |
          black pipeline/appml.py || true
          pylint --disable=R,C pipeline/appml.py || true

  deploy:
    name: Continuous Deployment (DockerHub & AWS)
    runs-on: ubuntu-latest 
    needs: [ci_pipeline]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 

      # --- ÉTAPE 1 : DOCKER HUB ---
      - name: Docker Hub Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ env.DOCKER_USER }} --password-stdin

      - name: Build and Push to Docker Hub
        run: |
          docker build -t ${{ env.DOCKER_USER }}/${{ env.REPO_NAME }}:latest -f pipeline/Dockerfile .
          docker push ${{ env.DOCKER_USER }}/${{ env.REPO_NAME }}:latest

      # --- ÉTAPE 2 : AWS ECR & ECS ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build avec le Dockerfile situé dans /pipeline
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f pipeline/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current Task Definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.ECS_TASK_DEFINITION }} \
          --query "taskDefinition | {containerDefinitions: containerDefinitions, family: family, executionRoleArn: executionRoleArn, taskRoleArn: taskRoleArn, networkMode: networkMode, requiresCompatibilities: requiresCompatibilities, cpu: cpu, memory: memory}" \
          > task-definition.json

      - name: Fill in the new image ID in the ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true