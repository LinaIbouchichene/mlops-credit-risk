name: Github-Docker Hub MLOps pipeline

env:
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  REPO_NAME: ${{ secrets.REPO_NAME }}

on:
  push:
    branches: [ "develop1" ]
  pull_request:
    branches: [ "develop1" ]

jobs:
  ci_pipeline: 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install black pylint pytest

      - name: Code Check
        run: |
          black pipeline/appml.py || true
          pylint --disable=R,C pipeline/appml.py || true

  cd_pipeline:
    runs-on: ubuntu-latest 
    needs: [ci_pipeline]
    steps:
      - uses: actions/checkout@v4 

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d--%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/${{ secrets.REPO_NAME }}:latest -f pipeline/Dockerfile .
          docker push ${{ secrets.DOCKER_USER }}/${{ secrets.REPO_NAME }}:latest